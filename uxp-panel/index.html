<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MCP Transcript Bridge</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        font-size: 13px;
      }

      body {
        margin: 0;
        padding: 14px;
        background: #202020;
        color: #f0f0f0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 600;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        color: #cfcfcf;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #141414;
        color: #f0f0f0;
      }

      button {
        min-width: 92px;
        margin: 12px 8px 12px 0;
        padding: 7px 10px;
        border: 1px solid #666;
        border-radius: 4px;
        background: #333;
        color: #f0f0f0;
      }

      button:disabled {
        opacity: 0.5;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0 12px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #777;
      }

      .dot.running {
        background: #31b45f;
      }

      .dot.error {
        background: #d95f5f;
      }

      #log {
        box-sizing: border-box;
        height: 220px;
        overflow: auto;
        padding: 8px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #111;
        color: #ddd;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .muted {
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>MCP Transcript Bridge</h1>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Stopped</span>
    </div>

    <label for="bridgeUrl">Local bridge URL</label>
    <input id="bridgeUrl" value="http://127.0.0.1:3000" spellcheck="false">

    <label for="clientId">Client ID</label>
    <input id="clientId" spellcheck="false">

    <button id="startButton">Start</button>
    <button id="stopButton" disabled>Stop</button>
    <button id="pingButton">Status</button>

    <div id="log" aria-live="polite"></div>

    <p class="muted">
      Polls GET /uxp/poll?clientId=... and posts results to POST /uxp/result.
    </p>

    <script src="main.js"></script>
  </body>
</html>
